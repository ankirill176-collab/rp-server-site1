<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Сервер — Донат и Привилегии</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1e2128;
            --card-bg: #2b2f3a;
            --accent-orange: #ff8c21;
            --text-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-white); }

        header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 24px; font-weight: 800; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Стиль секции из твоего макета */
        .donate-section {
            background-color: #262932;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .section-title { font-size: 18px; margin-bottom: 25px; color: #a0a5b1; }

        /* Сетка доната */
        .donate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .card h3 { font-size: 18px; margin-bottom: 20px; font-weight: 700; }

        /* Кнопка как на скрине */
        .buy-btn {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 10px 35px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover { background-color: #e67e1c; transform: scale(1.05); }

        /* Корзина (виджет сверху) */
        .cart-widget {
            position: fixed; top: 20px; right: 20px;
            background: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background: #ff4d4d; color: white; border-radius: 50%;
            padding: 2px 6px; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="cart-widget" onclick="alert('Корзина пока пуста!')">
    🛒 <div class="cart-count">0</div>
</div>

<header>
    <h1>RP Сервер — Донат и Привилегии</h1>
</header>

<div class="container">
    <div class="donate-section">
        <p class="section-title">Доступные привилегии</p>
        
        <div class="donate-grid">
            <div class="card"><h3>Бизнесмен</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Мажор</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Олигарх</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Чиновник</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Депутат</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Мэр</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Губернатор</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Дипломат</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Министр</h3><button class="buy-btn">Донат</button></div>
            <div class="card"><h3>Президент</h3><button class="buy-btn">Донат</button></div>
        </div>
    </div>
</div>

</body>
</html>
